apiVersion: v1
kind: Pod
metadata:
  name: zookeeper
  labels:
    app: zookeeper
spec:
  hostNetwork: true
  containers:
    - name: zookeeper
      image: docker.io/confluentinc/cp-zookeeper:7.5.0
      ports:
        - name: client
          containerPort: 2181
          protocol: TCP
      env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
      readinessProbe:
        exec:
          command: ["sh", "-c", "echo ruok | nc localhost 2181"]
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
      livenessProbe:
        exec:
          command: ["sh", "-c", "echo ruok | nc localhost 2181"]
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
---
apiVersion: v1
kind: Pod
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  hostNetwork: true
  containers:
    - name: kafka
      image: docker.io/confluentinc/cp-kafka:7.5.0
      ports:
        - name: broker-external
          containerPort: 9092
          protocol: TCP
        - name: broker-internal
          containerPort: 29092
          protocol: TCP
      env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "localhost:2181"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT"
        - name: KAFKA_LISTENERS
          value: "EXTERNAL://:9092,INTERNAL://:29092"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "EXTERNAL://localhost:9092,INTERNAL://__NODE_IP__:29092"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "EXTERNAL"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          memory: 1Gi
      readinessProbe:
        exec:
          command:
            - sh
            - -c
            - "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null"
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
      livenessProbe:
        exec:
          command:
            - sh
            - -c
            - "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null"
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
