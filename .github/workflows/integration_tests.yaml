name: K8s Integration Test

on:
  workflow_dispatch:
    inputs:
      KUBERNETES_DEBUG_INFO:
        description: 'Collect K8s cluster debug info and upload as artifact.'
        required: false
        default: false
        type: choice
        options:
          - false
          - true
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: 1.24.4
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 2
  CI_SPLUNK_HOST: localhost
  CI_SPLUNK_USERNAME: admin
  CI_SPLUNK_HEC_TOKEN: "00000000-0000-0000-0000-0000000000000"
  CI_SPLUNK_PASSWORD: helloworld
  CI_SPLUNK_MGMT_PORT: 8089
  CI_KAFKA_BROKER_ADDRESS: "localhost:9092"
  CI_SPLUNK_INDEX: kafka
  KUBERNETES_DEBUG_INFO: ${{ github.event.inputs.KUBERNETES_DEBUG_INFO || 'false' }}

jobs:
  integration-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        CI_SPLUNK_VERSION:
          - "10.2.2"
          - "9.4.10"
        MICROK8S_CHANNEL:
          - "1.35/stable"
          - "1.34/stable"
          - "1.33/stable"
          - "1.32/stable"
          - "1.31/stable"
          - "1.30/stable"
          - "1.29/stable"
          - "1.28/stable"
          - "1.27/stable"
    env:
      CI_SPLUNK_VERSION: ${{ matrix.CI_SPLUNK_VERSION }}
      MICROK8S_CHANNEL: ${{ matrix.MICROK8S_CHANNEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: '**/go.sum'

      # -- microk8s --------------------------------------------------------
      - name: Install microk8s
        run: |
          sudo snap install microk8s --classic --channel=${{ env.MICROK8S_CHANNEL }}
          sudo microk8s status --wait-ready
          sudo microk8s enable dns helm3

          echo "Waiting for node to be Ready..."
          sudo microk8s kubectl wait --for=condition=Ready node --all --timeout=120s
          sudo microk8s kubectl get nodes -o wide

          # Export the node IP for subsequent steps (Kafka needs it for advertised listeners)
          NODE_IP=$(sudo microk8s kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          echo "NODE_IP=${NODE_IP}" >> "$GITHUB_ENV"
          echo "Resolved node internal IP: ${NODE_IP}"

      # -- Kafka -----------------------------------------------------------
      - name: Deploy Kafka
        run: |
          sed -i "s|__NODE_IP__|${NODE_IP}|g" ci_scripts/k8s-kafka.yml
          sudo microk8s kubectl apply -f ci_scripts/k8s-kafka.yml

          echo "Waiting for Zookeeper..."
          sudo microk8s kubectl wait --for=condition=Ready pod/zookeeper --timeout=120s

          echo "Waiting for Kafka..."
          sudo microk8s kubectl wait --for=condition=Ready pod/kafka --timeout=120s

          # Connectivity check from the host (hostNetwork)
          for i in $(seq 1 30); do
            nc -z localhost 9092 && echo "Kafka is reachable on localhost:9092" && break
            echo "Waiting for Kafka to be reachable ($i/30)..."
            sleep 5
          done
          nc -z localhost 9092 || { echo "ERROR: Kafka not reachable after 150s"; exit 1; }

      # -- Splunk ----------------------------------------------------------
      - name: Deploy Splunk
        run: |
          sed -i "s|__SPLUNK_IMAGE__|splunk/splunk:${CI_SPLUNK_VERSION}|g"  ci_scripts/k8s-splunk.yml
          sed -i "s|__SPLUNK_PASSWORD__|${CI_SPLUNK_PASSWORD}|g"            ci_scripts/k8s-splunk.yml
          sed -i "s|__SPLUNK_HEC_TOKEN__|${CI_SPLUNK_HEC_TOKEN}|g"         ci_scripts/k8s-splunk.yml

          sudo microk8s kubectl apply -f ci_scripts/k8s-splunk.yml

          echo "Waiting for Splunk to initialize..."
          TIMEOUT=400
          START=$(date +%s)
          while true; do
            ELAPSED=$(( $(date +%s) - START ))
            LOGS=$(sudo microk8s kubectl logs splunk --tail=5 2>/dev/null || true)
            if echo "${LOGS}" | grep -q 'Ansible playbook complete'; then
              echo "Splunk is fully initialized! (${ELAPSED}s)"
              break
            fi
            if [ "${ELAPSED}" -ge "${TIMEOUT}" ]; then
              echo "ERROR: Splunk did not initialize within ${TIMEOUT}s"
              echo "=== Splunk pod status ==="
              sudo microk8s kubectl get pod splunk -o wide
              sudo microk8s kubectl describe pod splunk
              echo "=== Splunk logs (last 100 lines) ==="
              sudo microk8s kubectl logs splunk --tail=100
              exit 1
            fi
            echo "  still waiting... (${ELAPSED}s)"
            sleep 10
          done

      - name: Configure Splunk HEC
        run: |
          echo "Configuring HEC default token with index=kafka..."
          HTTP_CODE=$(curl -sk -o /tmp/hec_cfg_resp.json -w "%{http_code}" \
            -u "${CI_SPLUNK_USERNAME}:${CI_SPLUNK_PASSWORD}" \
            https://localhost:8089/servicesNS/nobody/splunk_httpinput/data/inputs/http/splunk_hec_token \
            -d index=kafka \
            -d indexes=kafka,main \
            -d output_mode=json)
          echo "HEC config response (HTTP ${HTTP_CODE}):"
          python3 -m json.tool /tmp/hec_cfg_resp.json 2>/dev/null || cat /tmp/hec_cfg_resp.json

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Default HEC token not found, creating a new one..."
            HTTP_CODE=$(curl -sk -o /tmp/hec_create_resp.json -w "%{http_code}" \
              -u "${CI_SPLUNK_USERNAME}:${CI_SPLUNK_PASSWORD}" \
              https://localhost:8089/services/data/inputs/http \
              -d name=splunk_hec_token \
              -d index=kafka \
              -d indexes=kafka,main \
              -d token="${CI_SPLUNK_HEC_TOKEN}" \
              -d output_mode=json)
            echo "HEC create response (HTTP ${HTTP_CODE}):"
            python3 -m json.tool /tmp/hec_create_resp.json 2>/dev/null || cat /tmp/hec_create_resp.json
            if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
              echo "ERROR: Failed to create HEC token (HTTP ${HTTP_CODE})"
              exit 1
            fi
          fi

      # -- SOC4Kafka chart -------------------------------------------------
      - name: Deploy SOC4Kafka chart
        run: ci_scripts/deploy_collector.sh

      - name: Wait for collector consumer readiness
        run: |
          echo "Waiting for collector to subscribe to Kafka topics..."
          COLLECTOR_POD=$(sudo microk8s kubectl get pods -l app.kubernetes.io/instance=ci-soc4kafka -o jsonpath='{.items[0].metadata.name}')
          TIMEOUT=60
          START=$(date +%s)
          while true; do
            ELAPSED=$(( $(date +%s) - START ))
            if sudo microk8s kubectl logs "${COLLECTOR_POD}" --tail=50 2>/dev/null | grep -q 'Starting receiver'; then
              echo "Collector receivers started. (${ELAPSED}s)"
              break
            fi
            if [ "${ELAPSED}" -ge "${TIMEOUT}" ]; then
              echo "WARN: Timed out waiting for receiver start log, proceeding anyway."
              break
            fi
            sleep 5
          done

      # -- Integration tests -----------------------------------------------
      - name: Run K8s Integration Tests
        id: run-integration-tests
        working-directory: tests
        run: |
          go test ./integration_tests/ -v -timeout 10m
      # -- Debug info on failure -------------------------------------------
      - name: Collect K8s debug info
        if: always() && (steps.run-integration-tests.outcome == 'failure' || env.KUBERNETES_DEBUG_INFO == 'true')
        run: |
          mkdir -p /tmp/k8s-debug

          echo "=== Node info ===" > /tmp/k8s-debug/cluster-info.txt
          sudo microk8s kubectl get nodes -o wide >> /tmp/k8s-debug/cluster-info.txt 2>&1

          echo "=== All pods ===" >> /tmp/k8s-debug/cluster-info.txt
          sudo microk8s kubectl get pods -A -o wide >> /tmp/k8s-debug/cluster-info.txt 2>&1

          echo "=== Pod descriptions ===" > /tmp/k8s-debug/pod-descriptions.txt
          sudo microk8s kubectl describe pods >> /tmp/k8s-debug/pod-descriptions.txt 2>&1

          echo "=== Events ===" > /tmp/k8s-debug/events.txt
          sudo microk8s kubectl get events --sort-by='.lastTimestamp' >> /tmp/k8s-debug/events.txt 2>&1

          # Collector logs
          COLLECTOR_POD=$(sudo microk8s kubectl get pods -l app.kubernetes.io/instance=ci-soc4kafka -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "${COLLECTOR_POD}" ]; then
            sudo microk8s kubectl logs "${COLLECTOR_POD}" > /tmp/k8s-debug/collector.log 2>&1
          fi

          # Splunk logs
          sudo microk8s kubectl logs splunk --tail=200 > /tmp/k8s-debug/splunk.log 2>&1

          # Kafka logs
          sudo microk8s kubectl logs kafka --tail=200 > /tmp/k8s-debug/kafka.log 2>&1

      - name: Print collector logs on failure
        if: always() && (steps.run-integration-tests.outcome == 'failure' || env.KUBERNETES_DEBUG_INFO == 'true')
        run: |
          COLLECTOR_POD=$(sudo microk8s kubectl get pods -l app.kubernetes.io/instance=ci-soc4kafka -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "${COLLECTOR_POD}" ]; then
            echo "=== SOC4Kafka collector logs ==="
            sudo microk8s kubectl logs "${COLLECTOR_POD}" | head -n 2000
          fi

      - name: Upload K8s debug info
        if: always() && (steps.run-integration-tests.outcome == 'failure' || env.KUBERNETES_DEBUG_INFO == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: k8s-debug-info-splunk-${{ matrix.CI_SPLUNK_VERSION }}-k8s-${{ matrix.MICROK8S_CHANNEL }}
          path: /tmp/k8s-debug/
          retention-days: 5
